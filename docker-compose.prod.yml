services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 15

  mongo:
    image: mongo:7
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis_demo_counter:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: "${REDIS_URL}"
      REDIS_KEY_PREFIX: "${REDIS_KEY_PREFIX}"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
    # Intentionally no --import: this sidecar does not load OTel; exporters are off above.
    command: ["node", "scripts/redis-demo-counter.js"]
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build: .
    # Load every key from `.env` into the container. The `environment` block below runs after
    # this and overrides any duplicate names — so compose-defined values always win on clashes.
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Quote "${VAR}" so values with spaces (e.g. ENV_CUSTOM) are valid YAML after substitution.
      PORT: "${PORT}"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      MONGODB_URI: "${MONGODB_URI}"
      REDIS_URL: "${REDIS_URL}"
      REDIS_KEY_PREFIX: "${REDIS_KEY_PREFIX}"
      MYSQL_HOST: "${MYSQL_HOST}"
      MYSQL_PORT: "${MYSQL_PORT}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      S3_ENDPOINT: "${S3_ENDPOINT}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
      S3_BUCKET: "${S3_BUCKET}"
      S3_REGION: "${S3_REGION}"
      ENV_CUSTOM: "${ENV_CUSTOM:-Hello World}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-demo-lander}"
      OTEL_METRICS_EXPORTER: "${OTEL_METRICS_EXPORTER:-none}"
      OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-none}"
      OTEL_LOGS_EXPORTER: "${OTEL_LOGS_EXPORTER:-none}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}"
      # Omit OTEL_EXPORTER_OTLP_ENDPOINT here so it is unset unless provided via .env (empty compose
      # substitution would override with "" and break OTLP when metrics exporter is otlp).
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  mysqldata:
  miniodata:

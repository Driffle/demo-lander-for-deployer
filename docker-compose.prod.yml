services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lander
      POSTGRES_PASSWORD: lander
      POSTGRES_DB: lander
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lander -d lander"]
      interval: 3s
      timeout: 3s
      retries: 15

  mongo:
    image: mongo:7
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: lander
      MYSQL_DATABASE: lander
      MYSQL_USER: lander
      MYSQL_PASSWORD: lander
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ulander", "-plander"]
      interval: 3s
      timeout: 3s
      retries: 15

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://lander:lander@db:5432/lander
      MONGODB_URI: mongodb://mongo:27017/demo_lander
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: demo_lander
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: lander
      MYSQL_USER: lander
      MYSQL_PASSWORD: lander
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: demo-uploads
      S3_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  mysqldata:
  miniodata:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lander
      POSTGRES_PASSWORD: lander
      POSTGRES_DB: lander
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lander -d lander"]
      interval: 3s
      timeout: 3s
      retries: 15

  mongo:
    image: mongo:7
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://lander:lander@db:5432/lander
      MONGODB_URI: mongodb://mongo:27017/demo_lander
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: demo_lander
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started

volumes:
  pgdata:
